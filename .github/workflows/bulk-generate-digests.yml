name: Bulk Generate Digests for Calibration

on:
  workflow_dispatch:
    inputs:
      count:
        description: 'Number of digests to generate'
        required: true
        default: '16'
        type: string

jobs:
  generate-digests:
    runs-on: ubuntu-latest
    timeout-minutes: 180  # 3 hours for multiple runs
    permissions:
      contents: write  # Allow pushing commits

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Generate multiple digests
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RESEND_API_KEY:    ${{ secrets.RESEND_API_KEY }}
          GMAIL_ADDRESS:     ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASS:    ${{ secrets.GMAIL_APP_PASS }}
          DIGEST_TO:         ${{ secrets.DIGEST_TO }}
          BRAVE_SEARCH_API_KEY: ${{ secrets.BRAVE_SEARCH_API_KEY }}
          EXA_API_KEY:          ${{ secrets.EXA_API_KEY }}
        run: |
          # Run the bulk generate script
          python evals/scripts/bulk_generate.py --count ${{ inputs.count }} --start-date 2026-01-01 --sleep 30

      - name: Upload generated digests
        uses: actions/upload-artifact@v4
        with:
          name: bulk-generated-digests
          path: evals/data/digests/*.html
          retention-days: 90

      - name: Commit and push digests
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add evals/data/digests/
          git diff --staged --quiet || git commit -m "Add bulk generated digests for calibration [skip ci]"
          git push
